name: Keep Backend Alive

# Pings Render every 14 minutes to prevent the free tier from sleeping.
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://balaji-fleet-backend.onrender.com/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS (may be warming up)"
          fi
